<style>
:root { --bg:#0b1220; --card:#111a2e; --text:#e7eefc; --muted:#a8b3cf; --accent:#4da3ff; --good:#3ddc97; --bad:#ff5c7a; }
*{ box-sizing:border-box; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
body{ margin:0; background:linear-gradient(160deg,#081022,#0b1220); color:var(--text); }
header{ position:sticky; top:0; backdrop-filter: blur(10px); background:rgba(11,18,32,.7); border-bottom:1px solid rgba(255,255,255,.08); z-index:10; }

.row{ display:flex; gap:12px; align-items:center; justify-content:space-between; flex-wrap:wrap; }

.sub{ color:var(--muted); font-size:14px; }
.bar{ height:10px; background:rgba(255,255,255,.08); border-radius:999px; overflow:hidden; }
.bar > div{ height:100%; width:0%; background:linear-gradient(90deg,var(--accent),#7cc6ff); transition:width .25s ease; }
main{ padding:20px 0 60px; }
.card{ background:rgba(17,26,46,.85); border:1px solid rgba(255,255,255,.08); border-radius:18px; box-shadow:0 10px 30px rgba(0,0,0,.35); }
.cardPad{ padding:18px; }
.grid{ display:grid; grid-template-columns:1fr; gap:14px; }
@media(min-width:900px){ .grid{ grid-template-columns: 2fr 1fr; } }
.h1{ font-size:26px; margin:0 0 10px; display:inline-block; position:relative; }
.h1::after{ content:""; display:block; width:58%; height:3px; margin-top:8px; border-radius:999px; background:linear-gradient(90deg, rgba(77,163,255,.95), rgba(124,198,255,.15)); }
.h2{ font-size:18px; margin:18px 0 10px; color:#d8e6ff; }
ul{ margin:10px 0 0 18px; color:var(--text); }
li{ margin:6px 0; }
.pill{ display:inline-flex; align-items:center; gap:8px; padding:6px 10px; border-radius:999px; background:rgba(77,163,255,.12); border:1px solid rgba(77,163,255,.35); color:#cfe7ff; font-size:12px; }
.btns{ display:flex; gap:10px; flex-wrap:wrap; }
button{ border:1px solid rgba(255,255,255,.12); background:rgba(255,255,255,.06); color:var(--text); padding:10px 14px; border-radius:12px; cursor:pointer; }
button:hover{ background:rgba(255,255,255,.10); }
button.primary{ background:rgba(77,163,255,.20); border-color:rgba(77,163,255,.55); }
.footerNav{ position:fixed; bottom:0; left:0; right:0; background:rgba(11,18,32,.75); border-top:1px solid rgba(255,255,255,.08); backdrop-filter: blur(10px); }
.footerNav .wrap{ display:flex; justify-content:space-between; align-items:center; gap:12px; }
.book{ max-width:70ch; margin:0; }
.book p{ color:var(--text); line-height:1.85; margin:10px 0; font-size:16px; }
.book p.lead{ color:#d8e6ff; font-size:16px; }
.book .dropcap:first-letter{ float:left; font-size:42px; line-height:38px; padding:6px 8px 0 0; color:#d8e6ff; font-weight:800; }
.quizBox{ margin-top:12px; border:1px solid rgba(255,255,255,.10); background:rgba(255,255,255,.03); border-radius:16px; padding:14px; }
.qTitle{ font-weight:800; color:#d8e6ff; margin:0 0 8px; }
.qPrompt{ margin:0 0 12px; line-height:1.75; color:var(--text); }
.qOptions{ display:grid; gap:10px; }
.qOpt{ text-align:left; border-radius:14px; padding:12px 12px; border:1px solid rgba(255,255,255,.12); background:rgba(255,255,255,.05); }
.qOpt:hover{ background:rgba(255,255,255,.08); }
.qOpt.correct{ border-color:rgba(61,220,151,.55); background:rgba(61,220,151,.12); }
.qOpt.wrong{ border-color:rgba(255,92,122,.55); background:rgba(255,92,122,.12); }
.qFeedback{ margin-top:12px; padding:10px 12px; border-radius:14px; border:1px solid rgba(255,255,255,.10); background:rgba(0,0,0,.18); color:var(--text); line-height:1.6; }
</style>

  "slides": [

    {

      "id": "s_x0i3rl53",
      "type": "content",
      "title": "The measurement bridge ",
      "text": "Capacitive Sensors\n\nA capacitive sensor represents a capacitor through which a change in a mechanical quantity is converted into a change in capacitance. Capacitive sensors are most commonly used to convert linear and angular displacements.\n\nThe capacitor used as a sensor may be flat (parallel-plate), cylindrical, or of another geometric shape. Most often, the first two types are used.\n\nRegardless of the geometric form of the capacitor, its capacitance C depends on the electrode area s, the distance between them d, and the absolute permittivity of the dielectric ε, that is C=f(s,d,ε)\n\nFrom this relationship it can be seen that the capacitance C can be changed by varying the surface area s, the distance d, or the absolute permittivity ε.\n\nAll three possibilities are used in the implementation of capacitive sensors.\n\nSensors with the basic structure are used to convert small linear displacements, reaching tenths of a micron.",
      "bullets": [],
      "useDropcap": true
    },
{
  "id": "s_j589d50n",
  "type": "content",
  "title": "The measurement bridge",
  "text": "The operation of this sensor is as follows.\n\nWhen the movable electrode 1 is displaced, it approaches one of the fixed electrodes (for example electrode 2) and moves away from the other.\n\n<div style=\"text-align:center;margin:20px 0;\">\n  <a href=\"images/capacitive_sensing.png\" target=\"_blank\">\n    <img src=\"images/capacitive_sensing.png\" alt=\"Capacitive sensors alt\" style=\"max-width:600px;width:100%;border-radius:8px;box-shadow:0 4px 14px rgba(0,0,0,0.25);cursor:pointer;\">\n  </a>\n  <div style=\"font-size:0.9em;color:#a8b3cf;margin-top:6px;\">Figure 1. Capacitive sensors (click to enlarge)</div>\n</div>\n\nAs a result, the capacitance C12 of the capacitor formed by electrodes 1 and 2 increases, while the capacitance C13, formed by electrodes 1 and 3, decreases.\n\nTo measure the displacement, either the increase of one capacitance or the decrease of the other can be used separately. Both changes can also be used simultaneously, which significantly increases the sensitivity of the sensor. In practice this is achieved by connecting the two capacitances C12 and C13 in adjacent arms of a bridge measurement circuit.\n\nTo further increase the sensitivity of the sensor, it is made of many elements placed one above another, with their movable electrodes connected together by a common shaft.\n\nIn Fig. 1b, the schematic structure of a capacitive sensor is shown in which the capacitance changes by varying the overlapping areas of the electrodes, i.e., the quantity s. The construction is analogous to that of variable capacitors used in radio engineering. This type of sensor is used for converting the rotation of a shaft.\n\nDepending on the shape of the electrodes, the relationship between capacitance and the angle of rotation may be linear, quadratic, logarithmic, or follow another law. Most often, sensors are designed so that this relationship is linear.\n\nSensors based on the change of overlapping area s are also constructed for converting linear displacements. In this case, the electrodes are two coaxial cylinders.\n\nIn Fig. 1c, a capacitive sensor is shown in which the capacitance changes due to a change in the electric permittivity ε of the medium between the electrodes.\n\nSuch sensors are used to measure the level of materials in tanks or hoppers, such as coal, various liquids in the chemical industry, and various products and semi-finished products in the food, cement, and other industries.\n\nThe medium between the electrodes consists of two substances:",
  "bullets": [
    "the substance whose level is being monitored, and",
    "the air above that substance."
  ],
  "useDropcap": true
},
    {
      "id": "s_z50qtx3e",
      "type": "content",
      "title": "The measurement bridge ",
      "text": "The change in the level of the material in the container is converted into a change in capacitance.\n\nCapacitive sensors are also used to measure mechanical forces. For this purpose, the property of some ceramic materials (for example barium titanate) to change their electrical permittivity when deformed is utilized.\n\nA major advantage of capacitive sensors is the possibility of using them to measure rapidly changing quantities—such as displacements, pressures, vibrations, and others. They are also characterized by high sensitivity.\n\nCapacitive sensors are supplied with an alternating voltage with a frequency ranging from 2–3 kHz up to 20–30 MHz. To produce the supply voltage, generators with the required parameters are designed.\n\nThis significantly complicates their use compared with other types of sensors, but their mentioned advantages make them indispensable in many areas of automation.",
      "bullets": [],
      "useDropcap": true
    },
    {
      "id": "s_xhbf6fo2",
      "type": "content",
      "title": "The measurement bridge ",
      "text": "Sensors Based on the Principle of Measuring the Electrical Conductivity of Liquids\n\nThe electrical conductivity of solutions depends on the nature of the dissolved substance and the solvent, as well as on their concentration and temperature. This dependence is used to measure the concentration of substances when the solvent and solute are known and the temperature is specified. \n\n<div style=\"text-align:center;margin:20px 0;\">\n  <a href=\"images/conductivity_vs_concentration.png\" target=\"_blank\">\n    <img src=\"images/conductivity_vs_concentration.png\" alt=\"Capacitive sensors alt\" style=\"max-width:600px;width:100%;border-radius:8px;box-shadow:0 4px 14px rgba(0,0,0,0.25);cursor:pointer;\">\n  </a>\n  <div style=\"font-size:0.9em;color:#a8b3cf;margin-top:6px;\">Figure 2. Conductivity vs concentration 1) Sulfuric acid 2) Sodium hydroxide (click to enlarge)</div>\n</div> \n\nFigure 2 shows the dependence of electrical conductivity on the concentration of aqueous solutions of sulfuric acid (1) and sodium hydroxide (2). As the concentration increases, the electrical conductivity initially increases and then decreases.\n\nThis behavior of conductivity can be explained by the fact that at low concentrations the conductivity is determined mainly by the number of charge carriers in the solution, namely the ions of the dissolved substance. At high concentrations, however, the conductivity depends primarily on the conditions for the movement of the ions.\n\nIn most industrial applications it is necessary to measure solutions with relatively low concentrations, where the rising part of the conductivity–concentration characteristic is valid.\n\nThe sensor used for measuring concentration is a measuring cell with two electrodes immersed in the solution being measured.\n\nThe resistance between them is determined by the formula 𝑅 = 1/(𝜒𝐺), where 𝜒 is the specific conductivity of the solution, which depends on the type of solution, and 𝐺 is the so-called geometric conductance of the solution. This quantity depends on the geometric shape of the electrodes and the distance between them.\n\nFor each type of sensor, the geometric conductance is fixed and constant, so the resistance 𝑅 depends only on the specific conductivity 𝜒, which in turn depends on the concentration of the solution.\n\nThus, measuring the concentration is reduced to measuring the electrical conductivity, or equivalently the ohmic resistance between two electrodes.\n\nThis measurement is performed using a secondary instrument for measuring resistance with alternating current. Direct current is not used, because it would cause electrolysis of the solution. The alternating current usually has a frequency of 1000 Hz or higher.\n\nThe sensor and the secondary resistance-measuring instrument are collectively known as a conductometer.\n\nAn advantage of conductometers, compared with other instruments for measuring concentration based on different principles, is their simple construction, which makes them easy to operate and reliable in practical use.\n\nThe total amount of substances contained in the solution affects the measurement. Therefore, determining only one of these components is possible only when the quantity of the other components remains constant or smaller than a predetermined value.\n\nUsually, conductometers are used to determine the concentration of that component of the solution for which the relationship between its quantitative content and the electrical conductivity of the solution is known in advance.",
      "bullets": [],
      "useDropcap": true
    },

      "id": "s_9tiiyfcq",
      "type": "content",
      "title": "Slide 3",
      "text": "Let there be a piston in the left tube of the figure. Let an external force act on it in the indicated direction. Due to the compression of the gas, its density, as well as its pressure, increases. Let us assume that the force acting on the piston is sufficient to create a pressure above the piston that is three times greater than atmospheric pressure. Below the piston, the gas expands and its pressure is lower; we assume it to be equal to normal atmospheric pressure, 1 atm. As expected, the pressure difference above and below the piston will create a flow of gas from high to low pressure, “from + to −.”.\n\n<div style=\"text-align:center;margin:20px 0;\">\n  <a href=\"images/mechanical_bridge.png\" target=\"_blank\">\n    <img src=\"images/mechanical_bridge.png\" alt=\"A mechanical analogy\" style=\"max-width:600px;width:100%;border-radius:8px;box-shadow:0 4px 14px rgba(0,0,0,0.25);cursor:pointer;\">\n  </a>\n  <div style=\"font-size:0.9em;color:#a8b3cf;margin-top:6px;\">Figure 3. A mechanica analogy (click to enlarge)</div>\n</div> \n\nOn the right side of the “chain,” there are two different obstrictions. The greater the resistance of one obstricting element compared to the other, the larger the “drop” across it. The smaller resistance (the wider obstriction) receives a smaller portion of the total “drop.” Therefore, it should not be surprising to note that the same relationship holds for electrical circuits, namely: \nR<sub>2</sub>/R<sub>1</sub> = U<sub>R2</sub>/U<sub>R1</sub>",

let state = { idx:0, quiz:{} };
const $ = (sel) => document.querySelector(sel);
function escapeHtml(str){ return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\"/g, "&quot;").replace(/'/g, "&#39;"); }
function paragraphsFromText(text){ return String(text || "").split(/\n\s*\n/).map(s => s.trim()).filter(Boolean); }
function renderContent(sl){
  let pHtml = "";
  paragraphsFromText(sl.text).forEach((p,i)=>{
    const cls = i===0 ? (sl.useDropcap ? "lead dropcap" : "lead") : "";
    pHtml += "<p class=\"" + cls + "\">" + p + "</p>";
  });

  if(!pHtml){
    pHtml = "<p class=\"lead dropcap\">Add slide text in the editor.</p>";
  }

  let ul = "";
  if((sl.bullets||[]).length){
    ul = "<ul>";
    sl.bullets.forEach(b => ul += "<li>" + b + "</li>");
    ul += "</ul>";
  }

  return "<div class=\"h1\">" + escapeHtml(sl.title) + "</div><div class=\"book\">" + pHtml + ul + "</div>"; }
function renderQuiz(sl){ const prev = state.quiz[sl.id]; const chosen = prev && typeof prev.selectedIndex === "number" ? prev.selectedIndex : null; const answered = !!prev; let opts = ""; sl.options.forEach((txt,i)=>{ let cls = "qOpt"; if(answered){ if(i===sl.correctIndex) cls += " correct"; else if(i===chosen) cls += " wrong"; } opts += "<button class=\""+cls+"\" data-i=\""+i+"\" type=\"button\">"+escapeHtml(txt)+"</button>"; }); const fb = answered ? "<div class=\"qFeedback\">" + (prev.isCorrect ? "✅ Correct. " : "❌ Not quite. ") + escapeHtml(sl.explanation || "") + "</div>" : ""; return "<div class=\"quizBox\"><div class=\"qTitle\">"+escapeHtml(sl.title)+"</div><p class=\"qPrompt\">"+escapeHtml(sl.question||"")+"</p><div class=\"qOptions\">"+opts+"</div>"+fb+"</div>"; }
function wireQuiz(sl){ document.querySelectorAll(".qOpt").forEach(btn => { btn.onclick = () => { const i = Number(btn.getAttribute("data-i")); state.quiz[sl.id] = { selectedIndex:i, isCorrect:i === sl.correctIndex }; render(); }; }); }
function render(){ $("#courseTitle").textContent = lessonData.courseTitle; $("#courseSub").textContent = lessonData.courseSub; const goals = $("#goals"); goals.innerHTML = ""; (lessonData.learningOutcomes || []).forEach(g => { const li = document.createElement("li"); li.textContent = g; goals.appendChild(li); }); state.idx = Math.max(0, Math.min(state.idx, lessonData.slides.length - 1)); $("#slideCounter").textContent = (state.idx + 1) + " / " + lessonData.slides.length; $("#progressFill").style.width = (((state.idx + 1)/lessonData.slides.length) * 100) + "%"; const sl = lessonData.slides[state.idx]; $("#slide").innerHTML = sl.type === "quiz" ? renderQuiz(sl) : renderContent(sl); $("#statusLine").textContent = sl.type === "quiz" ? "Quick Check" : "Reading slide"; $("#btnPrev").disabled = state.idx === 0; $("#btnNext").disabled = state.idx === lessonData.slides.length - 1; if(sl.type === "quiz") wireQuiz(sl); }
$("#btnPrev").onclick = () => { state.idx = Math.max(0, state.idx - 1); render(); };
$("#btnNext").onclick = () => { state.idx = Math.min(lessonData.slides.length - 1, state.idx + 1); render(); };
document.addEventListener("keydown", (e) => { if(e.key === "ArrowLeft"){ state.idx = Math.max(0, state.idx - 1); render(); } else if(e.key === "ArrowRight"){ state.idx = Math.min(lessonData.slides.length - 1, state.idx + 1); render(); } });
render();
</script>
